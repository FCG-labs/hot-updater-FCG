name: Publish to GitHub Packages

on:
  push:
    tags:
      - 'v*-fcg.*'  # v0.21.15-fcg.1 형식
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 0.21.15-fcg.2)'
        required: true
        type: string

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@fcg-labs'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.18.1

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm dependencies
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install monorepo dependencies
        run: pnpm install

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          fi

      - name: Update package.json files for FCG
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          PACKAGES=(
            "packages/core"
            "plugins/plugin-core"
            "packages/cli-tools"
            "packages/server"
            "plugins/js"
            "packages/console"
            "packages/hot-updater"
            "packages/react-native"
          )

          for pkg in "${PACKAGES[@]}"; do
            echo "� Updating $pkg/package.json..."
            node -e "
              const fs = require('fs');
              const pkgPath = '$pkg/package.json';
              const pkg = JSON.parse(fs.readFileSync(pkgPath, 'utf8'));

              // 이름 변환
              if (pkg.name === 'hot-updater') {
                pkg.name = '@fcg-labs/hot-updater';
              } else if (pkg.name.startsWith('@hot-updater/')) {
                pkg.name = pkg.name.replace('@hot-updater/', '@fcg-labs/hot-updater-');
              }

              pkg.version = '$VERSION';
              pkg.publishConfig = { registry: 'https://npm.pkg.github.com' };

              // dependencies 변환
              if (pkg.dependencies) {
                const newDeps = {};
                for (const [key, value] of Object.entries(pkg.dependencies)) {
                  if (key.startsWith('@hot-updater/') && value === 'workspace:*') {
                    const newKey = key.replace('@hot-updater/', '@fcg-labs/hot-updater-');
                    newDeps[newKey] = '$VERSION';
                  } else if (!value.startsWith('workspace:') && !value.startsWith('catalog:')) {
                    newDeps[key] = value;
                  }
                }
                pkg.dependencies = newDeps;
              }

              // devDependencies 정리
              if (pkg.devDependencies) {
                const newDevDeps = {};
                for (const [key, value] of Object.entries(pkg.devDependencies)) {
                  if (!value.startsWith('workspace:') && !value.startsWith('catalog:')) {
                    newDevDeps[key] = value;
                  }
                }
                pkg.devDependencies = newDevDeps;
              }

              fs.writeFileSync(pkgPath, JSON.stringify(pkg, null, 2) + '\n');
              console.log('  ✓', pkg.name + '@' + pkg.version);
            "
          done

      - name: Build all packages
        run: pnpm build

      - name: Publish packages
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          PACKAGES=(
            "packages/core"
            "plugins/plugin-core"
            "packages/cli-tools"
            "packages/server"
            "plugins/js"
            "packages/console"
            "packages/hot-updater"
            "packages/react-native"
          )

          for pkg in "${PACKAGES[@]}"; do
            echo "📦 Publishing $pkg..."
            cd "$GITHUB_WORKSPACE/$pkg"
            npm publish || echo "⚠️ Failed to publish $pkg"
            cd "$GITHUB_WORKSPACE"
          done

          echo "✅ Done!"
