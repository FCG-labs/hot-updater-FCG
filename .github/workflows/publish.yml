name: Build and Release

on:
  push:
    tags:
      - 'v*-fcg.*'  # v0.21.15-fcg.1 형식
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 0.21.15-fcg.2)'
        required: true
        type: string

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.18.1

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm dependencies
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install monorepo dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ inputs.version }}" >> $GITHUB_OUTPUT
            echo "TAG=v${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
            echo "TAG=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          fi

      - name: Build all packages
        run: pnpm build

      - name: Create tarballs
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          mkdir -p release-assets

          PACKAGES=(
            "packages/core"
            "plugins/plugin-core"
            "packages/cli-tools"
            "packages/server"
            "plugins/js"
            "plugins/aws"
            "plugins/bare"
            "plugins/cloudflare"
            "plugins/standalone"
            "packages/hot-updater"
            "packages/react-native"
          )

          for pkg in "${PACKAGES[@]}"; do
            echo "📦 Processing $pkg..."
            cd "$GITHUB_WORKSPACE/$pkg"

            # package.json 업데이트
            node -e "
              const fs = require('fs');
              const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));

              // 이름 변환
              if (pkg.name === 'hot-updater') {
                pkg.name = '@fcg-labs/hot-updater';
              } else if (pkg.name.startsWith('@hot-updater/')) {
                pkg.name = pkg.name.replace('@hot-updater/', '@fcg-labs/hot-updater-');
              }

              pkg.version = '$VERSION';

              // dependencies 변환 (tarball URL 사용)
              const TAG = 'v$VERSION';
              const BASE_URL = 'https://github.com/FCG-labs/hot-updater-FCG/releases/download/' + TAG;
              // 제외할 패키지 (빌드 미포함)
              const EXCLUDED = ['@hot-updater/console', '@hot-updater/mock'];
              if (pkg.dependencies) {
                const newDeps = {};
                for (const [key, value] of Object.entries(pkg.dependencies)) {
                  if (EXCLUDED.includes(key)) {
                    // 제외 패키지는 스킵
                    continue;
                  } else if (key === 'hot-updater' && value === 'workspace:*') {
                    newDeps['@fcg-labs/hot-updater'] = BASE_URL + '/hot-updater.tgz';
                  } else if (key.startsWith('@hot-updater/') && value === 'workspace:*') {
                    const shortName = key.replace('@hot-updater/', 'hot-updater-');
                    newDeps[key.replace('@hot-updater/', '@fcg-labs/hot-updater-')] = BASE_URL + '/' + shortName + '.tgz';
                  } else if (!value.startsWith('workspace:') && !value.startsWith('catalog:')) {
                    newDeps[key] = value;
                  }
                }
                pkg.dependencies = newDeps;
              }

              // devDependencies 정리 (배포 시 불필요)
              delete pkg.devDependencies;

              // 패키지명 변환 헬퍼
              function transformPkgName(name) {
                if (name === 'hot-updater') return '@fcg-labs/hot-updater';
                if (name.startsWith('@hot-updater/')) return name.replace('@hot-updater/', '@fcg-labs/hot-updater-');
                return name;
              }

              // peerDependencies 변환
              if (pkg.peerDependencies) {
                const newPeerDeps = {};
                for (const [key, value] of Object.entries(pkg.peerDependencies)) {
                  newPeerDeps[transformPkgName(key)] = value;
                }
                pkg.peerDependencies = newPeerDeps;
              }

              // peerDependenciesMeta 변환
              if (pkg.peerDependenciesMeta) {
                const newMeta = {};
                for (const [key, value] of Object.entries(pkg.peerDependenciesMeta)) {
                  newMeta[transformPkgName(key)] = value;
                }
                pkg.peerDependenciesMeta = newMeta;
              }

              // optionalDependencies 변환
              if (pkg.optionalDependencies) {
                const newOptDeps = {};
                for (const [key, value] of Object.entries(pkg.optionalDependencies)) {
                  newOptDeps[transformPkgName(key)] = value;
                }
                pkg.optionalDependencies = newOptDeps;
              }

              fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
              console.log('Updated:', pkg.name + '@' + pkg.version);
            "

            # dist 내 import 경로 변환 (@hot-updater/* → @fcg-labs/hot-updater-*)
            if [ -d "dist" ]; then
              find dist -name '*.js' -o -name '*.cjs' -o -name '*.mjs' | while read f; do
                sed -i 's/@hot-updater\//@fcg-labs\/hot-updater-/g' "$f"
              done
              find dist -name '*.d.ts' | while read f; do
                sed -i 's/@hot-updater\//@fcg-labs\/hot-updater-/g' "$f"
              done
              echo "  ✓ Transformed import paths in dist/"
            fi

            # tarball 생성 (간단한 이름으로)
            npm pack 2>/dev/null
            PKG_NAME=$(node -p "require('./package.json').name.replace('@fcg-labs/', '')")
            TARBALL=$(ls *.tgz | head -1)
            mv "$TARBALL" "$GITHUB_WORKSPACE/release-assets/${PKG_NAME}.tgz"
            echo "  ✓ Created ${PKG_NAME}.tgz"

            cd "$GITHUB_WORKSPACE"
          done

          echo "📋 Release assets:"
          ls -la release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.TAG }}
          name: Release ${{ steps.version.outputs.TAG }}
          body: |
            ## FCG Hot Updater ${{ steps.version.outputs.VERSION }}

            ### 설치 방법
            ```json
            {
              "@fcg-labs/hot-updater-react-native": "https://github.com/FCG-labs/hot-updater-FCG/releases/download/${{ steps.version.outputs.TAG }}/hot-updater-react-native.tgz",
              "@fcg-labs/hot-updater": "https://github.com/FCG-labs/hot-updater-FCG/releases/download/${{ steps.version.outputs.TAG }}/hot-updater.tgz"
            }
            ```
          files: release-assets/*.tgz
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
