name: Build and Release

on:
  push:
    tags:
      - 'v*-fcg.*'  # v0.21.15-fcg.1 형식
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 0.21.15-fcg.2)'
        required: true
        type: string

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.18.1

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm dependencies
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install monorepo dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ inputs.version }}" >> $GITHUB_OUTPUT
            echo "TAG=v${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
            echo "TAG=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          fi

      - name: Build all packages
        run: pnpm build

      - name: Create tarballs
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          mkdir -p release-assets

          PACKAGES=(
            "packages/core"
            "plugins/plugin-core"
            "packages/cli-tools"
            "packages/server"
            "plugins/js"
            "packages/hot-updater"
            "packages/react-native"
          )

          for pkg in "${PACKAGES[@]}"; do
            echo "📦 Processing $pkg..."
            cd "$GITHUB_WORKSPACE/$pkg"

            # package.json 업데이트
            node -e "
              const fs = require('fs');
              const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));

              // 이름 변환
              if (pkg.name === 'hot-updater') {
                pkg.name = '@fcg-labs/hot-updater';
              } else if (pkg.name.startsWith('@hot-updater/')) {
                pkg.name = pkg.name.replace('@hot-updater/', '@fcg-labs/hot-updater-');
              }

              pkg.version = '$VERSION';

              // dependencies 변환
              if (pkg.dependencies) {
                const newDeps = {};
                for (const [key, value] of Object.entries(pkg.dependencies)) {
                  if (key === 'hot-updater' && value === 'workspace:*') {
                    newDeps['@fcg-labs/hot-updater'] = '$VERSION';
                  } else if (key.startsWith('@hot-updater/') && value === 'workspace:*') {
                    const newKey = key.replace('@hot-updater/', '@fcg-labs/hot-updater-');
                    newDeps[newKey] = '$VERSION';
                  } else if (!value.startsWith('workspace:') && !value.startsWith('catalog:')) {
                    newDeps[key] = value;
                  }
                }
                pkg.dependencies = newDeps;
              }

              // devDependencies 정리 (배포 시 불필요)
              delete pkg.devDependencies;

              // peerDependencies 변환
              if (pkg.peerDependencies) {
                const newPeerDeps = {};
                for (const [key, value] of Object.entries(pkg.peerDependencies)) {
                  if (key === 'hot-updater') {
                    newPeerDeps['@fcg-labs/hot-updater'] = '*';
                  } else {
                    newPeerDeps[key] = value;
                  }
                }
                pkg.peerDependencies = newPeerDeps;
              }

              // peerDependenciesMeta 변환
              if (pkg.peerDependenciesMeta) {
                const newMeta = {};
                for (const [key, value] of Object.entries(pkg.peerDependenciesMeta)) {
                  if (key === 'hot-updater') {
                    newMeta['@fcg-labs/hot-updater'] = value;
                  } else {
                    newMeta[key] = value;
                  }
                }
                pkg.peerDependenciesMeta = newMeta;
              }

              fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
              console.log('Updated:', pkg.name + '@' + pkg.version);
            "

            # tarball 생성
            TARBALL=$(npm pack 2>/dev/null | tail -1)
            mv "$TARBALL" "$GITHUB_WORKSPACE/release-assets/"
            echo "  ✓ Created $TARBALL"

            cd "$GITHUB_WORKSPACE"
          done

          echo "📋 Release assets:"
          ls -la release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.TAG }}
          name: Release ${{ steps.version.outputs.TAG }}
          body: |
            ## FCG Hot Updater ${{ steps.version.outputs.VERSION }}

            ### 설치 방법
            ```json
            {
              "@fcg-labs/hot-updater-react-native": "https://github.com/FCG-labs/hot-updater-FCG/releases/download/${{ steps.version.outputs.TAG }}/fcg-labs-hot-updater-react-native-${{ steps.version.outputs.VERSION }}.tgz",
              "@fcg-labs/hot-updater": "https://github.com/FCG-labs/hot-updater-FCG/releases/download/${{ steps.version.outputs.TAG }}/fcg-labs-hot-updater-${{ steps.version.outputs.VERSION }}.tgz"
            }
            ```
          files: release-assets/*.tgz
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
